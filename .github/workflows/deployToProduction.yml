name: Deploy To Production

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch to deploy from (default: master)'
        required: false
        default: 'master'
        type: string

# Workflow-level concurrency so a new push waits for the current deploy to
# finish instead of cancelling it mid-flight (which could leave the server
# stuck in maintenance mode with half-applied changes).
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_branch || 'master' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for build
        run: |
          cat > .env <<'EOF'
          APP_NAME=Laravel
          APP_ENV=production
          APP_KEY=
          APP_DEBUG=false
          APP_URL=http://localhost
          LOG_CHANNEL=stack
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=debug
          EOF

      - name: Run Production Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Git for deploy branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create and push to deploy branch
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          SOURCE="${{ github.event.inputs.source_branch || 'master' }}"

          # Reset deploy branch to source HEAD
          git checkout -B deploy

          # Do not deploy the localhost build .env
          rm -f .env

          # Stage built assets only (avoid sweeping in dev junk from public/)
          git add -f public/build
          [ -f public/mix-manifest.json ] && git add -f public/mix-manifest.json || true
          [ -f public/hot ] && git rm -f public/hot || true

          git commit -m "Build assets from ${SOURCE} at ${BUILD_TIME}" --allow-empty
          git push -f origin deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Server using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/public_html

            # Guarantee maintenance mode is lifted, even if a later step fails.
            trap 'echo "Cleanup: ensuring app is up..."; php artisan up || true' EXIT

            echo "Activating maintenance mode..."
            php artisan down --retry=60

            echo "Fetching updates..."
            git fetch origin --prune

            if [ -f .env ]; then
              echo "Backing up current .env file..."
              cp .env .env.backup
            fi

            git reset --hard origin/deploy

            if [ -f .env.backup ]; then
              echo "Restoring production .env file..."
              mv .env.backup .env
            fi

            echo "Installing Composer dependencies..."
            export COMPOSER_HOME="$HOME/.config/composer"
            composer2 install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            echo "Refreshing caches..."
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "Running database migrations..."
            php artisan migrate --force

            echo "Restarting queues..."
            php artisan -v queue:restart

            # PHP-FPM holds compiled bytecode in OPcache. `git reset` updates
            # the files on disk but FPM keeps serving the old bytecode until
            # OPcache is reset. Hit a single-use, token-named PHP file through
            # the public URL so an FPM worker resets the shared OPcache.
            echo "Resetting PHP OPcache..."
            APP_URL=$(grep -E '^APP_URL=' .env | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'" | sed 's:/*$::')
            if [ -n "$APP_URL" ]; then
              TOKEN=$(openssl rand -hex 16)
              RESET_FILE="public/__opcache_reset_${TOKEN}.php"
              printf '%s\n' \
                '<?php' \
                'if (function_exists("opcache_reset")) {' \
                '    opcache_reset();' \
                '    echo "OPCACHE_RESET_OK";' \
                '} else {' \
                '    echo "OPCACHE_NOT_ENABLED";' \
                '}' > "$RESET_FILE"
              RESET_URL="${APP_URL}/__opcache_reset_${TOKEN}.php"
              echo "Calling ${RESET_URL}"
              curl -fsSk --max-time 30 "${RESET_URL}" || echo "(OPcache reset request failed, non-fatal)"
              echo
              rm -f "$RESET_FILE"
            else
              echo "APP_URL not found in .env; skipping OPcache reset"
            fi

            echo "Deactivating maintenance mode..."
            php artisan up

            # Disable the trap on the happy path so it does not run an extra
            # `php artisan up` after success.
            trap - EXIT

            echo "Deployment completed successfully!"
